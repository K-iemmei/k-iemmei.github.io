<!DOCTYPE html>
<html>
<head>
  <title>Admin VSCode CMS Level 2</title>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }

    #loginBox { padding: 20px; }

    #editorApp {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .main {
      display: flex;
      height: 90vh;
    }

    #explorer {
      width: 220px;
      background: #1e1e1e;
      color: white;
      padding: 10px;
    }

    #explorer div {
      padding: 6px;
      cursor: pointer;
    }

    #explorer div:hover {
      background: #333;
    }

    #container {
      flex: 1;
      height: 100%;
    }

    #topbar {
      padding: 10px;
      background: #eee;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="pw" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="editorApp">

  <div id="topbar">
    <button onclick="save()">💾 Save (Ctrl+S)</button>
    <span id="status"></span>
  </div>

  <div class="main">

    <div id="explorer"></div>

    <div id="container"></div>

  </div>

</div>

<script>
  
window._supabaseClient =
  window._supabaseClient ||
  window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );

const supabase = window._supabaseClient;
/* =====================
   CONFIG
===================== */
const PASSWORD = "1234";

const SUPABASE_URL = "https://lmqukgeyfmxprgkrujff.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtcXVrZ2V5Zm14cHJna3J1amZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMzQ5NTMsImV4cCI6MjA5ODgxMDk1M30.mz7NTaWXqcokWnuYb2k65dWmgvywpFpemnJcsO3UFk0";
supabaseClient
/* =====================
   STATE
===================== */
let editor;
let files = [];
let currentFileId = null;

/* =====================
   LOGIN
===================== */
function login(){
  const pw = document.getElementById("pw").value;

  if(pw === PASSWORD){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("editorApp").style.display = "flex";
    initEditor();
  } else {
    alert("Wrong password");
  }
}

/* =====================
   INIT EDITOR
===================== */
function initEditor(){

  require.config({
    paths: {
      vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs"
    }
  });

  require(["vs/editor/editor.main"], function () {

    editor = monaco.editor.create(document.getElementById("container"), {
      value: "",
      language: "html",
      theme: "vs-dark",
      automaticLayout: true
    });

    loadFiles();
  });

}

/* =====================
   LOAD FILES
===================== */
async function loadFiles(){

  const res = await fetch(SUPABASE_URL + "/rest/v1/files", {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  files = await res.json();
  renderExplorer();

}

/* =====================
   RENDER EXPLORER
===================== */
function renderExplorer(){

  const box = document.getElementById("explorer");
  box.innerHTML = "<h3>FILES</h3>";

  files.forEach(f => {
    box.innerHTML += `
      <div onclick="openFile(${f.id})">
        📄 ${f.name}
      </div>
    `;
  });

}

/* =====================
   OPEN FILE
===================== */
function openFile(id){

  const file = files.find(f => f.id === id);
  currentFileId = id;

  editor.setValue(file.content);

}

/* =====================
   SAVE FILE
===================== */
async function save(){

  const content = editor.getValue();

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/files?id=eq." + currentFileId,
    {
      method: "PATCH",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        content: content
      })
    }
  );

  document.getElementById("status").innerText = "Saved ✔";

}

/* =====================
   CTRL + S
===================== */
document.addEventListener("keydown", function(e){
  if(e.ctrlKey && e.key === "s"){
    e.preventDefault();
    save();
  }
});

</script>

</body>
</html>
